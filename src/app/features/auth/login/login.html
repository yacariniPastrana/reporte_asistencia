  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Acceso al Sistema</mat-card-title>
      <mat-card-subtitle>Biométrico Cloud Sync</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Usuario</mat-label>
          <input matInput formControlName="username" placeholder="Ej: USO001" autocomplete="username">
          <mat-icon matSuffix>person</mat-icon>
          <mat-error *ngIf="loginForm.get('username')?.hasError('required')">
            El usuario es obligatorio
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" autocomplete="current-password">
          <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            La contraseña es obligatoria
          </mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" class="full-width login-button" [disabled]="loginForm.invalid" type="submit">
          INGRESAR AL PANEL
        </button>
      </form>
    </mat-card-content>

    <mat-card-footer>
      <p class="footer-text">© 2026 ST Enterprise - Soluciones Tecnológicas</p>
    </mat-card-footer>
  </mat-card>
</div>
